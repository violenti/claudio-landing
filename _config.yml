# Site settings
title: Claudio 🐔
email: hello@claudio.ai
url: https://github.com/violenti/claudio
description: "Lightweight AI assistant powered by Anthropic and OpenAI - Your terminal-based AI companion"
keywords: "AI assistant, Claude, OpenAI, Anthropic, terminal, CLI, golang, LLM"
skills: "AI Assistant - Multi-LLM Support - Terminal Native - Open Source"
meta_author: Claudio Team

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 00ff00 #Terminal green
  primary-rgb: "0,255,0"
  secondary: 00ff00 #Terminal green
  secondary-dark: 008800 #Dark green

# Footer settings
footer:
  copyright: Claudio Team
  location: Open Source
  social: Connect With Us
  credits: Built with ❤️

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: github
    url: https://github.com/violenti/claudio

# Postal address (add as many lines as necessary)
address:
  - line: 742 Evergreen Terrace
  - line: Springfield

# Credits content
credits: ''

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""
