<!-- Features Section -->
<section id="portfolio">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Features</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="row">
      {% for post in site.posts %}
      <div class="col-md-4 col-sm-6 feature-item" style="margin-bottom: 30px;">
        <div style="background: #001100; border: 2px solid #00ff00; padding: 20px; border-radius: 5px; height: 200px;">
          <h3 style="color: #00ff00; text-align: center; margin-bottom: 15px; font-size: 1.2em;">{{ post.category }}</h3>
          <p style="color: #00ff00; text-align: center; font-size: 0.9em;">{{ post.description }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
